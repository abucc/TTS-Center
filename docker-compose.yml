version: '3.8'

services:
  # Kokoro ONNX TTS
  kokoro-onnx:
    build:
      context: ./kokoro-onnx
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - MODEL_PATH=/app/models
      - MAX_WORKERS=4
    volumes:
      - ./models/kokoro:/app/models
      - ./cache:/app/cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  # Chatterbox TTS Server
  chatterbox-tts:
    build:
      context: ./chatterbox-tts
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - MODELS_DIR=/app/models
      - CACHE_DIR=/app/cache
    volumes:
      - ./models/chatterbox:/app/models
      - ./cache:/app/cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G

  # OpenAI Edge TTS
  openai-edge-tts:
    build:
      context: ./openai-edge-tts
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - EDGE_TTS_CACHE_DIR=/app/cache
    volumes:
      - ./cache:/app/cache
      - ./voices:/app/voices
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Streamlabs TTS
  streamlabs-tts:
    build:
      context: ./streamlabs-tts
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./voices:/app/voices
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Unified TTS Gateway/API (Main service for Coolify)
  tts-gateway:
    build:
      context: ./tts-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "9000:8000"
    environment:
      - KOKORO_URL=http://kokoro-onnx:8000
      - CHATTERBOX_URL=http://chatterbox-tts:8000
      - EDGE_TTS_URL=http://openai-edge-tts:8000
      - STREAMLABS_URL=http://streamlabs-tts:8000
      - CORS_ORIGINS=*
    depends_on:
      - kokoro-onnx
      - chatterbox-tts
      - openai-edge-tts
      - streamlabs-tts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

networks:
  default:
    name: tts-network
