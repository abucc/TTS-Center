services:
  voice-hub-gateway:
    build:
      context: ./tts-gateway
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    container_name: voice-hub-gateway
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - PORT=9000
      - TZ=Asia/Shanghai
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-change-me}
      - SESSION_SECRET=${SESSION_SECRET:-change-this-session-secret}
      - REQUIRE_API_KEY=${REQUIRE_API_KEY:-false}
      - QWEN_URL=${QWEN_URL:-http://192.168.31.167:7861}
      - QWEN_TIMEOUT=${QWEN_TIMEOUT:-75}
      - VOICE_HUB_PUBLIC_URL=${VOICE_HUB_PUBLIC_URL:-http://192.168.31.180:9000}
      - VOICE_HUB_DATA_DIR=/opt/data/voice-hub
      - VOICE_HUB_CONFIG_DIR=/opt/data/voice-hub/config
      - VOICE_HUB_VOICES_DIR=/opt/data/voice-hub/voices
      - VOICE_HUB_DOCS_DIR=/app/docs
      - ALIYUN_DEFAULT_VOICE=${ALIYUN_DEFAULT_VOICE:-zhimi_emo}
      - ALIYUN_OUTPUT_FORMAT=${ALIYUN_OUTPUT_FORMAT:-wav}
      - ALIYUN_TIMEOUT=${ALIYUN_TIMEOUT:-180}
      - ALIYUN_TTS_COMMAND=${ALIYUN_TTS_COMMAND:-/usr/local/bin/python /opt/data/skills/aliyun-tts/scripts/aliyun_tts.py {text_file} {output_path} --voice {voice} --format {format}}
      - MIMO_API_KEY=${MIMO_API_KEY:-}
      - MIMO_BASE_URL=${MIMO_BASE_URL:-https://api.xiaomimimo.com/v1}
      - MIMO_MODEL=${MIMO_MODEL:-mimo-v2.5-tts-voiceclone}
      - MIMO_AUTH_HEADER=${MIMO_AUTH_HEADER:-auto}
      - MIMO_TIMEOUT=${MIMO_TIMEOUT:-180}
      - VOICE_STYLE_PATH=/opt/data/voice-hub/config/voice-styles.json
      - VOICE_HUB_TARGET_TTS_CHARS=${VOICE_HUB_TARGET_TTS_CHARS:-45}
      - VOICE_HUB_MAX_TTS_CHARS=${VOICE_HUB_MAX_TTS_CHARS:-60}
    volumes:
      - /volume1/docker/hermes-agent/data:/opt/data
      - ./config:/app/config
      - ./docs:/app/docs:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  voice-hub-frontend:
    build:
      context: ./tts-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    container_name: voice-hub-frontend
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - API_UPSTREAM=http://voice-hub-gateway:9000
    volumes:
      - ./tts-frontend/dist:/app:ro
      - ./tts-frontend/server.js:/server.js:ro
    command: ["node", "/server.js"]
    depends_on:
      - voice-hub-gateway
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3003', r => { const ok = r.statusCode < 500; r.resume(); r.on('end', () => process.exit(ok ? 0 : 1)); }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  default:
    name: voice-hub-network
