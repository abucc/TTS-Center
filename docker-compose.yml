version: '3.8'

services:
  # Kokoro ONNX TTS
  kokoro-onnx:
    build:
      context: ./kokoro-onnx
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - MODEL_PATH=/app/models
      - MAX_WORKERS=4
    volumes:
      - ./models/kokoro:/app/models
      - ./cache:/app/cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  # Chatterbox TTS Server
  chatterbox-tts:
    build:
      context: ./chatterbox-tts
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - HF_HOME=/app/hf_cache
      - TRANSFORMERS_CACHE=/app/hf_cache
      - HF_HUB_CACHE=/app/hf_cache
    volumes:
      - ./models/chatterbox:/app/model_cache
      - ./cache:/app/cache
      - chatterbox_hf_cache:/app/hf_cache
      - ./chatterbox-tts/voices:/app/voices
      - ./chatterbox-tts/reference_audio:/app/reference_audio
      - ./chatterbox-tts/outputs:/app/outputs
      - ./chatterbox-tts/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G



  # OpenAI Edge TTS
  openai-edge-tts:
    build:
      context: ./openai-edge-tts
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - API_KEY=your_api_key_here
      - PORT=5050
      - DEFAULT_VOICE=en-US-AvaNeural
      - DEFAULT_RESPONSE_FORMAT=mp3
      - DEFAULT_SPEED=1.0
      - DEFAULT_LANGUAGE=en-US
      - REQUIRE_API_KEY=True
      - REMOVE_FILTER=False
      - EXPAND_API=True
      - DETAILED_ERROR_LOGGING=True
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M



  # Unified TTS Gateway/API (Main service for Coolify)
  tts-gateway:
    build:
      context: ./tts-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "9000:8000"
    environment:
      - KOKORO_URL=http://kokoro-onnx:8000
      - CHATTERBOX_URL=http://chatterbox-tts:8000
      - OPENAI_EDGE_TTS_URL=http://openai-edge-tts:5050
      - CORS_ORIGINS=*
    depends_on:
      - kokoro-onnx
      - chatterbox-tts
      - openai-edge-tts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

volumes:
  chatterbox_hf_cache:

networks:
  default:
    name: tts-network
