version: '3.8'

services:
  # Kokoro ONNX TTS
  kokoro-onnx:
    build:
      context: ./kokoro-onnx
      dockerfile: Dockerfile
    restart: unless-stopped
    # Host port mapping removed to avoid conflicts
    environment:
      - MODEL_PATH=/app/models
      - MAX_WORKERS=4
    volumes:
      - ./models/kokoro:/app/models
      - ./cache:/app/cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  # Chatterbox TTS Server (Optional - comment out if causing issues)
  chatterbox-tts:
    build:
      context: ./chatterbox-tts
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "9001:8000"
    environment:
      - HF_HOME=/app/hf_cache
      - TRANSFORMERS_CACHE=/app/hf_cache
      - HF_HUB_CACHE=/app/hf_cache
    volumes:
      - ./models/chatterbox:/app/model_cache
      - ./cache:/app/cache
      - chatterbox_hf_cache:/app/hf_cache
      - ./chatterbox-tts/voices:/app/voices
      - ./chatterbox-tts/reference_audio:/app/reference_audio
      - ./chatterbox-tts/outputs:/app/outputs
      - ./chatterbox-tts/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 900s  # 15 minutes for model download
    deploy:
      resources:
        limits:
          memory: 6G  # Increased memory for model loading
        reservations:
          memory: 2G



  # OpenAI Edge TTS
  openai-edge-tts:
    build:
      context: ./openai-edge-tts
      dockerfile: Dockerfile
    restart: unless-stopped
    # Host port mapping removed to avoid conflicts
    environment:
      - API_KEY=your_api_key_here
      - PORT=5050
      - DEFAULT_VOICE=en-US-AvaNeural
      - DEFAULT_RESPONSE_FORMAT=mp3
      - DEFAULT_SPEED=1.0
      - DEFAULT_LANGUAGE=en-US
      - REQUIRE_API_KEY=True
      - REMOVE_FILTER=False
      - EXPAND_API=True
      - DETAILED_ERROR_LOGGING=True
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M



  # Unified TTS Gateway/API (Main service for Coolify)
  tts-gateway:
    build:
      context: ./tts-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "9000:8000"
    environment:
      - KOKORO_URL=http://kokoro-onnx:8000
      - CHATTERBOX_URL=http://chatterbox-tts:8000
      - OPENAI_EDGE_TTS_URL=http://openai-edge-tts:5050
      - CORS_ORIGINS=*
    depends_on:
      - kokoro-onnx
      - chatterbox-tts
      - openai-edge-tts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Modern React Frontend
  tts-frontend:
    build:
      context: ./tts-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3003:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - tts-gateway
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Redis for caching (optional but recommended)
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Port mapping removed to avoid conflicts on host
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --save 60 1000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M

volumes:
  chatterbox_hf_cache:
  redis_data:

networks:
  default:
    name: tts-network
