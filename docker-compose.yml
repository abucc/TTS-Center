version: '3.8'

services:
  # Kokoro ONNX TTS
  kokoro-onnx:
    build:
      context: ./kokoro-onnx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "9002:9002"
    environment:
      - MODEL_PATH=/app/models
      - MAX_WORKERS=4
      - PORT=9002
    volumes:
      - ./models/kokoro:/app/models
      - ./cache:/app/cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  # Chatterbox TTS Server (Optional - comment out if causing issues)
  chatterbox-tts:
    build:
      context: ./chatterbox-tts
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "9001:9001"
    environment:
      - HF_HOME=/app/hf_cache
      - TRANSFORMERS_CACHE=/app/hf_cache
      - HF_HUB_CACHE=/app/hf_cache
      - PORT=9001
    volumes:
      - ./models/chatterbox:/app/model_cache
      - ./cache:/app/cache
      - chatterbox_hf_cache:/app/hf_cache
      - ./chatterbox-tts/reference_audio:/app/reference_audio
      - ./chatterbox-tts/outputs:/app/outputs
      - ./chatterbox-tts/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 900s  # 15 minutes for model download
    deploy:
      resources:
        limits:
          memory: 6G  # Increased memory for model loading
        reservations:
          memory: 2G



  # OpenAI Edge TTS
  openai-edge-tts:
    build:
      context: ./openai-edge-tts
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5050:5050"
    environment:
      - API_KEY=${API_KEY}
      - PORT=5050
      - DEFAULT_VOICE=${DEFAULT_VOICE}
      - DEFAULT_RESPONSE_FORMAT=${DEFAULT_RESPONSE_FORMAT}
      - DEFAULT_SPEED=${DEFAULT_SPEED}
      - DEFAULT_LANGUAGE=${DEFAULT_LANGUAGE}
      - REQUIRE_API_KEY=${REQUIRE_API_KEY}
      - REMOVE_FILTER=${REMOVE_FILTER}
      - EXPAND_API=${EXPAND_API}
      - DETAILED_ERROR_LOGGING=${DETAILED_ERROR_LOGGING}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M



  # Unified TTS Gateway/API (Main service for Coolify)
  tts-gateway:
    build:
      context: ./tts-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - KOKORO_URL=http://kokoro-onnx:9002
      - CHATTERBOX_URL=http://chatterbox-tts:9001
      - OPENAI_EDGE_TTS_URL=http://openai-edge-tts:5050
      - PORT=9000
      - CORS_ORIGINS=${CORS_ORIGINS}
      - REDIS_ENABLED=${REDIS_ENABLED}
      - REDIS_URL=${REDIS_URL}
      - REDIS_KEY_PREFIX=${REDIS_KEY_PREFIX}
    depends_on:
      - kokoro-onnx
      - chatterbox-tts
      - openai-edge-tts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Modern React Frontend
  tts-frontend:
    build:
      context: ./tts-frontend
      dockerfile: Dockerfile
      args:
        - VITE_GATEWAY_URL=http://tts-gateway:9000
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - PORT=3003
    depends_on:
      - tts-gateway
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  chatterbox_hf_cache:

networks:
  default:
    name: tts-network
