events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;
    
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=tts:10m rate=2r/s;
    
    # Upstream servers
    upstream tts_gateway {
        server tts-gateway:8000;
        keepalive 32;
    }
    
    upstream kokoro_direct {
        server kokoro-onnx:8000;
        keepalive 16;
    }
    
    upstream chatterbox_direct {
        server chatterbox-tts:8000;
        keepalive 16;
    }
    
    upstream openai_edge_tts_direct {
        server openai-edge-tts:5050;
        keepalive 16;
    }
    
    # HTTP redirect to HTTPS
    server {
        listen 80;
        server_name tts.dahopevi.com;
        return 301 https://$server_name$request_uri;
    }
    
    # Main HTTPS server
    server {
        listen 443 ssl http2;
        server_name tts.dahopevi.com;
        
        # SSL configuration (you'll need to add your certificates)
        ssl_certificate /etc/nginx/ssl/tts.dahopevi.com.crt;
        ssl_certificate_key /etc/nginx/ssl/tts.dahopevi.com.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
        
        client_max_body_size 10M;
        
        # Main gateway (web interface and unified API)
        location / {
            limit_req zone=api burst=20 nodelay;
            
            proxy_pass http://tts_gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Timeouts for TTS requests
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
        
        # TTS endpoint with special rate limiting
        location /tts {
            limit_req zone=tts burst=5 nodelay;
            
            proxy_pass http://tts_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Extended timeouts for TTS generation
            proxy_connect_timeout 30s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }
        
        # Direct access to individual services (optional)
        location /kokoro/ {
            limit_req zone=api burst=10 nodelay;
            
            rewrite ^/kokoro/(.*) /$1 break;
            proxy_pass http://kokoro_direct;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location /chatterbox/ {
            limit_req zone=api burst=10 nodelay;
            
            rewrite ^/chatterbox/(.*) /$1 break;
            proxy_pass http://chatterbox_direct;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location /openai-edge-tts/ {
            limit_req zone=api burst=10 nodelay;
            
            rewrite ^/openai-edge-tts/(.*) /$1 break;
            proxy_pass http://openai_edge_tts_direct;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Health check endpoint
        location /health {
            access_log off;
            proxy_pass http://tts_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
        
        # Static files (if any)
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
